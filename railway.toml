[build]
buildCommand = "pip install -r requirements.txt && playwright install chromium --with-deps || true"

[deploy]
# Phase 1.2 Drill-preview rollback drill runner.
#
# This branch (chore/preview-rollback-drill) is a preview deployment
# target only — DO NOT MERGE TO MAIN. The branch exists so the
# Railway preview-audit-activation environment can run
# scripts/audit_rollback_drill.py from INSIDE the Railway runtime,
# where the internal DATABASE_URL is reachable.
#
# The drill validates the AUDIT_EMISSION_ENABLED mechanism end-to-end
# via subprocess-per-phase isolation. Each subprocess is a fresh
# Python that reads AUDIT_EMISSION_ENABLED from env at module load —
# the closest in-process analogue to a Railway redeploy with a
# changed env var. No monkey-patching of helper internals.
#
# Production safety:
#   - When DATABASE_URL is unset (production posture), the drill is
#     skipped via the `if [ -n "$DATABASE_URL" ]` guard, and the web
#     server starts immediately.
#   - `set -e` ensures any drill failure aborts the deploy loudly —
#     Railway will mark the deploy failed and NOT promote the new
#     container to live traffic.
#   - `exec python3 server.py` hands PID 1 to the Python web process
#     for clean signal handling.
#
# The drill internally validates the schema is in place (delegated
# to activate_audit.py's check primitives via the smoke test's
# proven path) and writes six helper-path rows to audit.events.
# Those drill rows are preserved as activation evidence — the audit
# chain is append-only by design.
#
# After Drill-preview succeeds, the preview environment can be
# re-pointed back to main and this branch deleted or abandoned.
startCommand = "bash -c 'set -e; if [ -n \"$DATABASE_URL\" ]; then echo \">>> DATABASE_URL set — running scripts/audit_rollback_drill.py\"; python3 scripts/audit_rollback_drill.py; echo \">>> Rollback drill complete — starting web server\"; else echo \">>> DATABASE_URL unset — skipping rollback drill (production-safe path)\"; fi; exec python3 server.py'"
