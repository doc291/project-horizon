[build]
buildCommand = "pip install -r requirements.txt && playwright install chromium --with-deps || true"

[deploy]
# Phase 1.2 Stage C-preview migration runner.
#
# This branch (chore/preview-migration-runner) is a preview deployment
# target only — DO NOT MERGE TO MAIN. The branch exists so the
# Railway preview-audit-activation environment can pick it up and run
# alembic migrations + read-only schema validation from INSIDE the
# Railway runtime (where the internal DATABASE_URL is reachable),
# rather than from a developer's Mac (where the public Railway proxy
# may be unreachable).
#
# Production safety:
#   - When DATABASE_URL is unset (production posture) the migration
#     step is skipped via the `if [ -n "$DATABASE_URL" ]` guard, and
#     the web server starts exactly as before.
#   - `set -e` ensures any migration or validation failure aborts the
#     deploy loudly — Railway will report a failed deploy and NOT
#     promote the new container to live traffic.
#   - `exec python3 server.py` hands PID 1 to the Python web process
#     so signal handling (SIGTERM on redeploy) is clean.
#
# After Stage C-preview succeeds and the operator confirms the audit
# schema is in place, this branch can be deleted or abandoned.
startCommand = "bash -c 'set -e; if [ -n \"$DATABASE_URL\" ]; then echo \">>> DATABASE_URL set — running alembic upgrade head\"; alembic upgrade head; echo \">>> Running scripts/activate_audit.py validation probe\"; python3 scripts/activate_audit.py; echo \">>> Migration and validation complete — starting web server\"; else echo \">>> DATABASE_URL unset — skipping migration (production-safe path)\"; fi; exec python3 server.py'"
